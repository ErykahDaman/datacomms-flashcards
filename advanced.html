      a:`<div class="ans-block"><strong>MAC address table (switch):</strong><br>Maps <strong>MAC address → port number</strong>. The switch learns which MAC address is reachable through which port and stores this. Used to make forwarding decisions at Layer 2.<br>View with: <code>show mac address-table</code></div><div class="ans-block"><strong>ARP cache (PC or router):</strong><br>Maps <strong>IP address → MAC address</strong>. Used by a host to find the MAC address it needs to build a frame for a known IP address.<br>View with: <code>arp -a</code> (Windows) or <code>show arp</code> (Cisco)</div>`
    },
    { diff:'exam', marks:'[4 marks]',
      q:`Describe the frame forwarding decisions a switch can make. Name and explain the THREE actions a switch can take.`,
      a:`<div class="ans-step"><div class="step-num" style="background:rgba(255,107,107,.2);color:#ff6b6b">1</div><div><strong>Filter (known unicast):</strong> If the destination MAC is in the MAC table AND is on the SAME port the frame arrived on, the switch drops the frame — no need to forward it.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(255,169,77,.2);color:#ffa94d">2</div><div><strong>Forward (known unicast to different port):</strong> If the destination MAC is in the MAC table on a DIFFERENT port, the switch forwards the frame only out that specific port.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(169,227,75,.2);color:#a9e34b">3</div><div><strong>Flood (unknown unicast / broadcast / multicast):</strong> If the destination MAC is NOT in the MAC table, or if it is a broadcast/multicast address, the switch floods the frame out ALL ports except the incoming port.</div></div>`
    },
    { diff:'medium', marks:'[2 marks]',
      q:`What is the purpose of the STP (Spanning Tree Protocol) on a switched network?`,
      a:`<div class="ans-block"><strong>STP purpose:</strong> Prevents <strong>switching loops</strong> in a network that has redundant links between switches. Without STP, a broadcast frame would circulate indefinitely around the loop, consuming all bandwidth (broadcast storm).</div><div class="ans-block"><strong>How it works:</strong> STP elects a Root Bridge, then calculates the best loop-free path to the root. Redundant ports are placed in a <em>Blocking</em> state — they receive BPDUs but do not forward frames. If the active link fails, a blocked port transitions to Forwarding, restoring connectivity.</div>`
    },
    { diff:'hard', marks:'[4 marks]',
      q:`Explain the difference between a collision domain and a broadcast domain. How do switches and routers handle each?`,
      a:`<div class="ans-block"><strong>Collision domain:</strong> A segment of a network where only ONE device can transmit at a time. If two devices transmit simultaneously, a collision occurs. A switch creates a SEPARATE collision domain per port — eliminating collisions between ports. A hub has ONE collision domain for all connected devices.</div><div class="ans-block"><strong>Broadcast domain:</strong> A segment where a broadcast frame is forwarded to ALL devices. Switches do NOT break broadcast domains — all ports on a switch are in the same broadcast domain (unless VLANs are configured). Routers DO break broadcast domains — broadcasts cannot pass through a router.</div>`
    },
    { diff:'exam', marks:'[3 marks]',
      q:`Describe THREE advantages of using switches over hubs in a modern LAN.`,
      a:`<div class="ans-step"><div class="step-num" style="background:rgba(255,107,107,.2);color:#ff6b6b">1</div><div><strong>Eliminated collisions:</strong> Each switch port is its own collision domain. Devices on different ports never collide, enabling full-duplex operation.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(255,169,77,.2);color:#ffa94d">2</div><div><strong>Dedicated bandwidth:</strong> Each port gets its own dedicated bandwidth — not shared. A 1 Gbps switch gives each device 1 Gbps, whereas a hub shares that bandwidth among all ports.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(169,227,75,.2);color:#a9e34b">3</div><div><strong>Intelligent forwarding / Security:</strong> Frames are only sent to the intended recipient port. Other devices do not see the frame, reducing unnecessary traffic and limiting eavesdropping.</div></div>`
    },
  ]},

  /*── MODULE 7 ─────────────────────────────────────────*/
  { id:'m7', label:'M7 – Ethernet Switching', cards:[
    { diff:'exam', marks:'[4 marks]',
      q:`Describe Store-and-Forward and Cut-Through frame forwarding. State ONE advantage and ONE disadvantage of each.`,
      a:`<div class="ans-block"><strong>Store-and-Forward:</strong> Receives the ENTIRE frame before forwarding. Runs a CRC error check on the FCS — corrupt frames are discarded.<br>✅ Error-free forwarding; required for QoS.<br>❌ Higher latency.</div><div class="ans-block"><strong>Cut-Through:</strong> Reads ONLY the destination MAC (first 6 bytes) then immediately starts forwarding — before the rest arrives.<br>✅ Lowest possible latency.<br>❌ No error checking — corrupt frames are forwarded.</div>`
    },
    { diff:'exam', marks:'[2 marks]',
      q:`State the TWO variants of cut-through forwarding and explain how they differ.`,
      a:`<div class="ans-step"><div class="step-num" style="background:rgba(99,230,190,.2);color:#63e6be">1</div><div><strong>Fast-Forward:</strong> Forwards immediately after reading the dest MAC (6 bytes). Absolute lowest latency. Zero error checking — even runts are forwarded.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(77,171,247,.2);color:#4dabf7">2</div><div><strong>Fragment-Free:</strong> Reads the first <strong>64 bytes</strong> before forwarding. Catches collision fragments (runts are almost always < 64 bytes). A compromise between speed and basic error filtering.</div></div>`
    },
    { diff:'exam', marks:'[4 marks]',
      q:`MAC table: Port 1=AA:AA, Port 2=BB:BB, Port 3=CC:CC.\nPC-A (AA:AA) sends a frame to PC-C (CC:CC) — what does the switch do?\nPC-A then sends to PC-X (DD:DD) — what does the switch do?`,
      a:`<div class="ans-block"><strong>To PC-C (CC:CC) — known unicast:</strong><br>Switch looks up CC:CC → found on Port 3 → forwards ONLY out Port 3. Ports 1 and 2 receive nothing. This is called <strong>filtering</strong>.</div><div class="ans-block"><strong>To PC-X (DD:DD) — unknown unicast:</strong><br>DD:DD is NOT in the MAC table → switch <strong>floods</strong> the frame out ALL ports EXCEPT Port 1 (incoming). When PC-X replies, the switch learns DD:DD's port and adds it to the table.</div>`
    },
    { diff:'hard', marks:'[2 marks]',
      q:`What is a 'runt' Ethernet frame? What causes it and what does a switch do with it?`,
      a:`<div class="ans-block"><strong>Runt:</strong> An Ethernet frame smaller than the minimum size of <strong>64 bytes</strong>. Not a valid frame.</div><div class="ans-block"><strong>Cause:</strong> Typically caused by collisions on a half-duplex link, or a faulty NIC.</div><div class="ans-block"><strong>Switch action:</strong> Store-and-Forward and Fragment-Free modes discard runts. Fast-Forward mode may forward them.</div>`
    },
    { diff:'hard', marks:'[4 marks]',
      q:`Compare Port-Based memory buffering and Shared Memory buffering in a switch. Which is better and why?`,
      a:`<div class="ans-block"><strong>Port-Based:</strong> Each port has its own dedicated queue. Problem: <strong>head-of-line (HOL) blocking</strong> — if the destination port is busy, ALL frames behind that frame wait, even if their destination ports are free.</div><div class="ans-block"><strong>Shared Memory:</strong> All frames go into a single common pool. Any frame can go to any port. Eliminates HOL blocking, supports asymmetric link speeds (e.g. 10 Mbps → 1 Gbps), uses memory more efficiently. <strong>Generally superior</strong> for modern networks.</div>`
    },
    { diff:'hard', marks:'[2 marks]',
      q:`Why does modern full-duplex switched Ethernet NOT require CSMA/CD?`,
      a:`<div class="ans-step"><div class="step-num" style="background:rgba(99,230,190,.2);color:#63e6be">1</div><div><strong>Separate collision domains:</strong> Each switch port is its own collision domain — devices on different ports cannot collide.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(77,171,247,.2);color:#4dabf7">2</div><div><strong>Full-duplex:</strong> A device can transmit and receive simultaneously on separate wire pairs. No shared medium → no competition → collisions are physically impossible.</div></div>`
    },
    { diff:'exam', marks:'[4 marks]',
      q:`Describe the process by which a switch builds and maintains its MAC address table.`,
      a:`<div class="ans-step"><div class="step-num" style="background:rgba(255,107,107,.2);color:#ff6b6b">1</div><div><strong>Learn:</strong> When a frame arrives, the switch reads the <em>source MAC address</em> and records which port it arrived on — adding "MAC → Port" to the MAC address table.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(255,169,77,.2);color:#ffa94d">2</div><div><strong>Age out:</strong> Each entry has an ageing timer (typically 300 seconds). If no frame is received from that MAC during the timer period, the entry is removed — keeping the table current.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(169,227,75,.2);color:#a9e34b">3</div><div><strong>Update:</strong> If a device moves to a different port, the next frame from that MAC updates the entry to the new port, replacing the old entry.</div></div>`
    },
    { diff:'hard', marks:'[3 marks]',
      q:`What is an auto-MDIX feature on a switch? Why does it matter?`,
      a:`<div class="ans-block"><strong>Auto-MDIX (Automatic Medium-Dependent Interface Crossover):</strong> A feature that automatically detects whether a straight-through or crossover cable is used, and electronically reconfigures the interface to make the connection work regardless of cable type.</div><div class="ans-block"><strong>Why it matters:</strong> Before auto-MDIX, technicians had to carefully choose the correct cable type (straight-through for unlike devices, crossover for like devices). With auto-MDIX, either cable type works — eliminating a common source of connection errors and simplifying installations. Available on most modern Cisco switches.</div>`
    },
    { diff:'exam', marks:'[4 marks]',
      q:`Describe the steps a switch takes when it receives a frame destined for a BROADCAST address. What impact does this have on the network?`,
      a:`<div class="ans-block"><strong>Steps:</strong><br>1. Frame arrives — switch checks the destination MAC.<br>2. Destination MAC = FF:FF:FF:FF:FF:FF (broadcast).<br>3. Switch does NOT look this up in the MAC table — broadcasts are always flooded.<br>4. Switch forwards the frame out <strong>ALL ports except the incoming port</strong>.<br>5. Every device on the switch receives and processes the frame.</div><div class="ans-block"><strong>Network impact:</strong> All devices must interrupt their CPU to process the frame even if the broadcast is not relevant to them. In large networks, high broadcast rates create a <strong>broadcast storm</strong> that degrades performance. VLANs and routers are used to contain broadcast domains.</div>`
    },
    { diff:'hard', marks:'[4 marks]',
      q:`What is a VLAN and why is it used? State TWO benefits of implementing VLANs.`,
      a:`<div class="ans-block"><strong>VLAN (Virtual Local Area Network):</strong> A logical grouping of switch ports that creates separate virtual broadcast domains on the same physical switch — without needing separate physical switches.</div><div class="ans-block"><strong>Benefits:</strong><br>1. <strong>Security:</strong> Devices in different VLANs cannot communicate directly — they are logically isolated. Sensitive departments (e.g. Finance) can be separated from others.<br>2. <strong>Reduced broadcast traffic:</strong> Broadcasts are contained within a VLAN — devices in other VLANs do not receive them, reducing unnecessary CPU interruptions and improving performance.</div>`
    },
    { diff:'exam', marks:'[5 marks]',
      q:`Write the commands to create VLAN 10 named "SALES" and assign port Fa0/1 to it on a Cisco switch.`,
      a:`<span class="cmd">! Step 1: Create the VLAN and name it
Switch(config)# vlan 10
Switch(config-vlan)# name SALES
Switch(config-vlan)# exit</span><span class="cmd">! Step 2: Assign a port to the VLAN
Switch(config)# interface fastethernet 0/1
Switch(config-if)# switchport mode access
Switch(config-if)# switchport access vlan 10
Switch(config-if)# end</span><span class="cmd">! Verify
Switch# show vlan brief</span>`
    },
    { diff:'hard', marks:'[3 marks]',
      q:`What is the difference between an access port and a trunk port on a Cisco switch?`,
      a:`<div class="ans-block"><strong>Access port:</strong> Belongs to exactly ONE VLAN. Frames entering or leaving an access port are untagged — the end device (PC, printer) has no knowledge of VLANs. Used to connect end-user devices.</div><div class="ans-block"><strong>Trunk port:</strong> Carries traffic from MULTIPLE VLANs on a single link. Uses 802.1Q tagging to identify which VLAN each frame belongs to. Used to connect switches to switches, or switches to routers (router-on-a-stick).</div>`
    },
    { diff:'exam', marks:'[4 marks]',
      q:`Explain 'router-on-a-stick'. When is it used and what commands configure a subinterface for VLAN 10 on router interface G0/0?`,
      a:`<div class="ans-block"><strong>Router-on-a-stick:</strong> A technique for inter-VLAN routing using a single physical router interface connected via a trunk link to a switch. The router interface is divided into multiple <em>subinterfaces</em>, each assigned to a VLAN — allowing traffic to be routed between VLANs through the single physical link.</div><div class="ans-block"><strong>Used when:</strong> inter-VLAN communication is needed but no Layer 3 switch is available.</div><span class="cmd">Router(config)# interface g0/0.10
Router(config-subif)# encapsulation dot1q 10
Router(config-subif)# ip address 192.168.10.1 255.255.255.0
Router(config-subif)# end</span>`
    },
    { diff:'hard', marks:'[4 marks]',
      q:`Describe THREE Layer 2 switch security features you can configure to harden a switch.`,
      a:`<div class="ans-step"><div class="step-num" style="background:rgba(99,230,190,.2);color:#63e6be">1</div><div><strong>Port Security:</strong> Limits the number of MAC addresses allowed on a port. If an unauthorised device connects (unknown MAC), the port can shut down, restrict, or drop traffic. Prevents MAC flooding attacks.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(77,171,247,.2);color:#4dabf7">2</div><div><strong>Disable unused ports:</strong> Administratively shut down all unused switch ports (<code>shutdown</code>). Prevents unauthorised physical access to the network.</div></div><div class="ans-step"><div class="step-num" style="background:rgba(218,119,242,.2);color:#da77f2">3</div><div><strong>DHCP Snooping:</strong> Prevents rogue DHCP servers from assigning incorrect IP configurations. Only designated "trusted" ports can send DHCP offers — all others are untrusted and DHCP server replies from them are dropped.</div></div>`
    },
    { diff:'exam', marks:'[4 marks]',
      q:`What is a MAC flooding attack? How does it work and what is its goal?`,
      a:`<div class="ans-block"><strong>MAC flooding attack:</strong> An attacker sends thousands of frames with random, spoofed source MAC addresses to a switch. The switch learns all these fake MACs, filling its MAC address table (CAM table) to capacity.</div><div class="ans-block"><strong>Effect:</strong> Once the CAM table is full, the switch can no longer store new, legitimate entries. When a frame arrives for a destination not in the table, the switch floods it out ALL ports — turning the switch into a hub.</div><div class="ans-block"><strong>Goal:</strong> The attacker on one port can now capture traffic destined for ALL other devices — effectively performing a passive eavesdropping attack on the entire VLAN. <strong>Mitigation:</strong> Port security limits MAC addresses per port.</div>`
    },
  ]},
];

/* ══ BUILD "ALL" MODULE ══ */
const allCards = modules.flatMap(m => m.cards.map(c => ({...c, _mod: m.id, _label: m.label.replace(/M\d – /,'')})));
const allModule = { id:'all', label:'All Modules', cards: allCards };
const allModules = [allModule, ...modules];

/* ══ STATE ══ */
let activeIdx = 0;   // index into allModules
let deck = [];
let cardIdx = 0;
let isFlipped = false;

/* ══ INIT ══ */
function init() {
  renderTabs();
  loadModule(1); // start on M1
}

function loadModule(i) {
  activeIdx = i;
  deck = [...allModules[i].cards];
  cardIdx = 0;
  isFlipped = false;
  renderTabs();
  renderCard();
}

/* ══ TABS ══ */
function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = allModules.map((m, i) => {
    const active = i === activeIdx;
    const colorVar = m.id === 'all' ? 'accent' : m.id;
    const style = active ? `background:var(--${colorVar});border-color:var(--${colorVar});` : '';
    return `<button class="tab${active?' active':''}" style="${style}" onclick="loadModule(${i})">${m.label}</button>`;
  }).join('');
}

/* ══ RENDER CARD ══ */
function renderCard() {
  const card = deck[cardIdx];
  const mod = allModules[activeIdx];
  const colorId = card._mod || mod.id;
  const label = card._label || mod.label.replace(/M\d – /,'');

  isFlipped = false;

  // Sync scene colour class
  const scene = document.getElementById('card-scene');
  scene.className = 'card-scene'; // reset
  scene.classList.add('scene-' + colorId);
  scene.classList.remove('flipped');

  // Trigger entrance animation
  scene.style.animation = 'none';
  void scene.offsetWidth;
  scene.style.animation = '';

  // Front
  document.getElementById('card-label').textContent = label;
  document.getElementById('card-marks').textContent = card.marks || '';
  document.getElementById('card-q').textContent = card.q;

  const db = document.getElementById('card-diff');
  db.className = 'diff-badge diff-' + (card.diff || 'hard');
  db.textContent = card.diff === 'exam' ? 'EXAM STYLE' : card.diff === 'medium' ? 'MEDIUM' : 'HARD';

  // Back
  document.getElementById('card-label-back').textContent = label + ' — Model Answer';
  document.getElementById('card-a').innerHTML = card.a;

  // Progress
  const total = deck.length;
  const pct = Math.round(((cardIdx + 1) / total) * 100);
  document.getElementById('prog-label').textContent = `Card ${cardIdx+1} of ${total}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-fill').style.background = `var(--${colorId === 'all' ? 'accent' : colorId})`;
  document.getElementById('card-count').textContent = `${cardIdx+1} / ${total}`;

  // Nav buttons
  document.getElementById('btn-prev').disabled = cardIdx === 0;
  document.getElementById('btn-next').disabled = cardIdx === total - 1;

  // Sync back face height to match front after render
  syncCardHeight();
}

function syncCardHeight() {
  requestAnimationFrame(() => {
    const inner = document.getElementById('card-inner');
    const front = inner.querySelector('.card-front');
    const back = inner.querySelector('.card-back');

    // Reset heights
    front.style.minHeight = '';
    back.style.minHeight = '';

    // Measure natural heights
    const fh = front.scrollHeight;
    // Back is absolute, so measure differently
    back.style.visibility = 'hidden';
    back.style.position = 'relative';
    back.style.transform = 'none';
    const bh = back.scrollHeight;
    back.style.position = '';
    back.style.transform = '';
    back.style.visibility = '';

    const h = Math.max(300, fh, bh) + 10;
    front.style.minHeight = h + 'px';
    back.style.minHeight = h + 'px';
  });
}

/* ══ FLIP ══ */
function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-scene').classList.toggle('flipped', isFlipped);
}

/* ══ NAVIGATION ══ */
function nextCard() {
  if (cardIdx < deck.length - 1) { cardIdx++; renderCard(); }
}
function prevCard() {
  if (cardIdx > 0) { cardIdx--; renderCard(); }
}
function shuffleCards() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  cardIdx = 0;
  renderCard();
}
function resetCards() {
  deck = [...allModules[activeIdx].cards];
  cardIdx = 0;
  renderCard();
}

/* ══ KEYBOARD ══ */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextCard();
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevCard();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

window.addEventListener('load', init);
</script>
